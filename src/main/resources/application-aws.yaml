spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/clientdocs
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  storage:
    type: s3
    s3:
      bucket-name: ${AWS_S3_BUCKET_NAME}
      region: ${AWS_REGION}