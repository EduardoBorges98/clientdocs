spring:
  application:
    name: clientdocs

  datasource:
    url: jdbc:postgresql://localhost:5432/clientdocs
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true

server:
  port: 8080